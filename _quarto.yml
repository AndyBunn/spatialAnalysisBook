project:
  type: book
  output-dir: docs
  pre-render: Rscript purl_all.R

book:
  title: "Spatial Analysis for Environmental Science"
  subtitle: "Course Notes"
  author: "Andy Bunn"
  date: today
  description: "Spatial analysis notes and exercises"
  navbar:
    background: dark
    search: true
  chapters:
    - file: index.qmd
      text: "Cover"
    - part: "Foundations"
      chapters:
        - 00Welcome.qmd
        - 01SpatialCrashCourse.qmd
        - 01xAsideMethodsAndGenerics.qmd
    - part: "Point Patterns & Autocorrelation"
      chapters:
        - 02Point_Patterns.qmd
        - 02xAsideDistanceMatrices.qmd
        - 03aIntro2Autocorrelation.qmd
        - 03xAsideCorrelationVersusRegression.qmd
        - 03bLISA.qmd
    - part: "Interpolation & Geostatistics"
      chapters:
        - 04aGeostatsIDW.qmd
        - 04xAsideModelSkill.qmd
        - 04bGeostat2TPS.qmd
        - 05aGeostatsKriging.qmd
        - 05xAsideGeostatsKrigingVariance.qmd
        - 05bGeostatsRegressionKriging.qmd
        - 05xAsidePredictingNewData.qmd
    - part: "Regression"
      chapters:
        - 06RegressionGLS.qmd
        - 06xAsideOLS-Algebra-Matrix.qmd
    - 07PackagesUsed.qmd
  repo-url: https://github.com/AndyBunn/spatialNotes
  repo-actions: [edit, issue]

bibliography:
  - packages.bib
  - other.bib

reference-location: document

format:
  html:
    theme: cosmo
    css: custom.css
    code-fold: show
    toc: true
    toc-depth: 4
    number-sections: false

execute:
  warning: false
  message: false
  freeze: auto